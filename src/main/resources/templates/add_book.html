<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Book</title>
</head>
<body>
<h1>Add New Book</h1>

<form th:action="@{/admin/add-book}" th:object="${book}" method="post">
    <label>Title:</label>
    <input type="text" th:field="*{title}" required/><br/><br/>

    <label>Author:</label>
    <input type="text" th:field="*{author}" required/><br/><br/>

    <label>Price:</label>
    <input type="number" step="0.01" th:field="*{price}" required/><br/><br/>

    <label>Category:</label>
    <input type="text" th:field="*{category}" required/><br/><br/>

    <label>Description:</label>
    <textarea th:field="*{description}" required></textarea><br/><br/>

    <button type="submit">Add Book</button>
</form>

<a href="/admin/dashboard">Back to Dashboard</a>
</body>
</html>
